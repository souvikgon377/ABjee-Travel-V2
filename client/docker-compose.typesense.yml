version: '3.8'
services:
  typesense:
    image: ${TYPESENSE_DOCKER_IMAGE:-typesense/typesense:30.2}
    container_name: typesense
    restart: unless-stopped
    ports:
      - "8108:8108"
    environment:
      - TYPESENSE_API_KEY=${TYPESENSE_API_KEY:-typesense_dev_key}
    volumes:
      - ./typesense-data:/data
    command: >
      --data-dir /data
      --api-key=${TYPESENSE_API_KEY:-typesense_dev_key}
      --listen-port 8108
      --enable-cors

volumes:
  typesense-data: {}
