version: '3.8'
services:
  typesense:
    image: typesense/typesense:0.24.0
    container_name: typesense
    restart: unless-stopped
    ports:
      - "8108:8108"
    environment:
      - TYPESENSE_API_KEY=typesense_dev_key
    volumes:
      - ./typesense-data:/data
    command: >
      --data-dir /data
      --api-key=typesense_dev_key
      --listen-port 8108

volumes:
  typesense-data: {}
